# Redis 配置文件
# 这是 mini-redis 的配置文件，遵循 Redis 配置规范

# ******************************************************************************
# 网络配置
# ******************************************************************************

# 绑定 IP 地址
# 默认监听所有网络接口，生产环境建议绑定具体 IP
# bind 127.0.0.1

# 监听端口
port 6379

# TCP 连接队列长度
tcp-backlog 511

# 客户端连接超时时间（秒），0 表示不超时
timeout 0

# TCP keepalive 检测间隔（秒）
tcp-keepalive 300

# ******************************************************************************
# 通用配置
# ******************************************************************************

# 是否以守护进程方式运行
daemonize no

# 进程 ID 文件路径
# pidfile /var/run/redis.pid

# 日志级别
# 可选值：debug, verbose, notice, warning
loglevel notice

# 日志文件路径
# logfile ""

# 数据库数量
databases 16

# ******************************************************************************
# 慢查询日志配置 (Slowlog)
# ******************************************************************************

# 慢查询阈值（微秒）
# 执行时间超过此值的命令会被记录到慢查询日志中
# 负值表示禁用慢查询日志，0 表示记录所有命令
# 默认值：10000（10毫秒）
slowlog-log-slower-than 0

# 慢查询日志最大长度
# 慢查询日志使用 FIFO 队列，当超过此长度时，最旧的记录会被移除
# 默认值：128
slowlog-max-len 128

# ******************************************************************************
# 持久化配置（RDB）
# ******************************************************************************

# 数据保存策略
# 格式：save <seconds> <changes>
# 在指定秒数内发生指定次数的修改时，自动触发保存
# save 900 1
# save 300 10
# save 60 10000

# 如果后台保存出错，是否停止写入操作
stop-writes-on-bgsave-error yes

# 是否压缩 RDB 文件
rdbcompression yes

# RDB 文件校验
rdbchecksum yes

# RDB 数据库文件名
dbfilename dump.rdb

# 数据文件存放目录
# dir ./

# ******************************************************************************
# 内存管理配置
# ******************************************************************************

# 最大内存限制
# maxmemory <bytes>

# 内存淘汰策略
# 可选值：
#   volatile-lru    -> 从已设置过期时间的键中使用 LRU 算法淘汰
#   allkeys-lru     -> 从所有键中使用 LRU 算法淘汰
#   volatile-lfu    -> 从已设置过期时间的键中使用 LFU 算法淘汰
#   allkeys-lfu     -> 从所有键中使用 LFU 算法淘汰
#   volatile-random -> 从已设置过期时间的键中随机淘汰
#   allkeys-random  -> 从所有键中随机淘汰
#   volatile-ttl    -> 淘汰即将过期的键
#   noeviction      -> 不淘汰，写入操作返回错误（默认）
# maxmemory-policy noeviction

# LRU/LFU 采样数量
# maxmemory-samples 5

# ******************************************************************************
# 客户端配置
# ******************************************************************************

# 最大客户端连接数
# maxclients 10000
